adapter:
  name: slack
  version: "1.0"
  quality: STUB
  required_scripts:
    - name: "start.sh"
      exit_codes: [0]
      timeout_seconds: 30
    - name: "health.sh"
      exit_codes: [0, 1, 2]
      timeout_seconds: 10
    - name: "stop.sh"
      exit_codes: [0]
      timeout_seconds: 15
  required_bus_scripts:
    - "core/bus/send-{channel}.sh"
    - "core/bus/check-{channel}.sh"
    - "core/bus/hook-permission-{channel}.sh"
  optional_bus_scripts: []
  message_schema: "core/schemas/adapter-message.schema.json"
  outbound_features:
    - chunking         # 4000 char limit
    - thread           # thread_ts support
    - photo            # files.upload API
    - mrkdwn           # Slack's markdown variant
  extra_scripts:
    - name: "socket-listener.py"
      description: "Slack Socket Mode event listener"
      required: true
  config_fields:
    - name: "SLACK_BOT_TOKEN"
      required: true
      env_only: true
    - name: "SLACK_CHANNEL_ID"
      required: true
      env_only: true
